<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>KneuraTRAX™ — Shared Ledger + P&L</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kneuralabs/trax/main/LOGO.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f6f6f6; --surface:#fff; --surface-2:#f0f0f0; --surface-3:#e6e6e6;
  --label-1:#0c0c0c; --label-2:#282828; --label-3:#686868; --label-4:#a8a8a8;
  --sep:rgba(0,0,0,.07); --sep-solid:#dedede; --line:1px solid #dedede;
  --accent:#0055ff; --accent-dark:#0033cc; --accent-bg:#f0f4ff;
  --green:#00a050; --green-bg:#f0faf4; --green-text:#006030;
  --red:#d42020; --red-bg:#fff2f2; --red-text:#a01010;
  --orange-bg:#fffaf0; --orange-text:#8a4800;
  --teal-bg:#f0fafc; --teal-text:#0a6078;
  --purple-bg:#f8f0ff; --purple-text:#601898;
  --r-sm:0px; --r-md:0px; --r-lg:0px; --r-pill:0px;
  --text-xs:11px; --text-sm:13px; --text-body:15px; --text-lg:20px; --text-xl:36px;
  --sh1:none; --sh2:none; --sh3:none;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}
[data-theme=dark]{
  --bg:#0e0e0e; --surface:#1a1a1a; --surface-2:#252525; --surface-3:#303030;
  --label-1:#f0f0f0; --label-2:#c8c8c8; --label-3:#888; --label-4:#555;
  --sep:rgba(255,255,255,.07); --sep-solid:#333; --line:1px solid #333;
  --accent:#4d8fff; --accent-dark:#6aaeff; --accent-bg:#1a2a4a;
  --green:#3ecf7e; --green-bg:#0d2318; --green-text:#3ecf7e;
  --red:#f06060; --red-bg:#2a1010; --red-text:#f06060;
  --orange-bg:#2a1e0a; --orange-text:#f0a040;
  --teal-bg:#0a1e24; --teal-text:#40c0d8;
  --purple-bg:#1e0a30; --purple-text:#c080ff;
}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--label-1);overflow:hidden;font-size:var(--text-sm);font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:'cv05' 1,'ss01' 1,'kern' 1}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sep-solid)}
.ic{width:15px;height:15px;stroke:currentColor;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;display:inline-block;vertical-align:middle}

/* LANDING */
.error-msg{color:var(--red-text);background:var(--red-bg);padding:10px 14px;display:none;font-size:var(--text-xs);line-height:1.5;border-left:2px solid var(--red)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 16px;font-weight:500;cursor:pointer;border:var(--line);font-size:var(--text-sm);font-family:inherit;transition:background .1s,color .1s,opacity .1s,transform .1s;white-space:nowrap;line-height:1;-webkit-user-select:none;user-select:none;letter-spacing:-0.01em;border-radius:0;min-height:44px;touch-action:manipulation}
.btn:active{transform:scale(0.97)}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn-primary{background:var(--label-1);color:#fff;border-color:var(--label-1)}
.btn-primary:hover{background:var(--label-2);border-color:var(--label-2)}
.btn-secondary{background:var(--surface-2);color:var(--label-2)}
.btn-secondary:hover{background:var(--surface-3)}
.btn-ghost{background:transparent;color:var(--label-2)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-destructive{background:var(--red);color:#fff;border-color:var(--red)}
.btn-destructive:hover{opacity:.85}

/* INPUTS — 16px prevents iOS auto-zoom */
input[type=text],input[type=password],input[type=number],input[type=date],select,textarea{width:100%;padding:11px 12px;border:var(--line);font-size:16px;background:var(--surface);color:var(--label-1);font-family:inherit;transition:border-color .12s;-webkit-appearance:none;appearance:none;outline:none;letter-spacing:-0.005em;border-radius:0;min-height:44px;touch-action:manipulation}
input:focus,select:focus,textarea:focus{border-color:var(--label-1)}
input:focus-visible,select:focus-visible,textarea:focus-visible{border-color:var(--accent)}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg)}
.app-header{background:rgba(255,255,255,.92);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border-bottom:var(--line);padding:0 max(24px,calc(16px + var(--safe-left)));padding-right:max(24px,calc(16px + var(--safe-right)));height:calc(50px + var(--safe-top));padding-top:var(--safe-top);display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative;z-index:10}
[data-theme=dark] .app-header{background:rgba(26,26,26,.92)}
[data-theme=dark] .btn-primary{background:var(--label-1);color:#111;border-color:var(--label-1)}
[data-theme=dark] .btn-primary:hover{background:var(--label-2);border-color:var(--label-2);color:#111}
[data-theme=dark] .net-card{background:var(--surface-2)}
[data-theme=dark] .net-lbl{color:var(--label-3)}
[data-theme=dark] .net-val{color:var(--label-1)}
.header-brand{font-family:'Inter',sans-serif;font-size:15px;font-weight:700;letter-spacing:-0.03em;margin-right:2px;display:flex;align-items:center;gap:6px}
.header-logo{width:28px;height:28px;object-fit:contain;mix-blend-mode:multiply;flex-shrink:0}
[data-theme=dark] .header-logo{mix-blend-mode:screen;filter:invert(1) brightness(1.8)}
.theme-btn{background:none;border:none;cursor:pointer;padding:10px;display:flex;align-items:center;justify-content:center;color:var(--label-3);min-width:44px;min-height:44px;transition:color .15s;touch-action:manipulation}
.theme-btn:hover{color:var(--label-1)}
.source-pill{background:var(--surface-2);padding:3px 8px;font-size:11px;font-weight:500;color:var(--label-3);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:var(--line)}
.hsp{flex:1}
.hact{display:flex;align-items:center;gap:2px}
.hact .btn{min-height:44px;min-width:44px;padding:10px}

/* HERO */
.hero{background:var(--surface);border-bottom:var(--line);padding:18px max(24px,calc(16px + var(--safe-left)));display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;flex-shrink:0}
.hero-primary{display:flex;flex-direction:column;gap:2px}
.hero-label{font-size:var(--text-xs);font-weight:600;color:var(--label-4);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:2px}
.hero-value{font-size:var(--text-xl);font-weight:700;color:var(--label-1);letter-spacing:-0.03em;line-height:1;font-variant-numeric:tabular-nums}
.hero-sub{font-size:var(--text-sm);color:var(--label-4);font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
.hero-status{display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-size:var(--text-xs);font-weight:600;letter-spacing:0.01em}
.surplus{color:var(--green-text)} .deficit{color:var(--red-text)}
.hero-stats{display:flex;gap:16px;align-items:flex-end;flex-wrap:nowrap}
.stat{display:flex;flex-direction:column;gap:1px;text-align:right}
.stat-lbl{font-size:var(--text-xs);font-weight:600;color:var(--label-4);letter-spacing:0.05em;text-transform:uppercase}
.stat-val{font-size:var(--text-lg);font-weight:600;color:var(--label-2);font-variant-numeric:tabular-nums;letter-spacing:-0.02em}
.stat-sub{font-size:var(--text-xs);color:var(--label-4);font-variant-numeric:tabular-nums}
.stat-rate{background:var(--surface-2);padding:5px 8px;font-size:var(--text-sm);font-weight:500;color:var(--label-2);border:var(--line)}

/* TABLE */
.toolbar{display:flex;justify-content:space-between;align-items:center;padding:10px max(24px,calc(16px + var(--safe-left)));gap:10px;flex-shrink:0;background:var(--surface);border-bottom:var(--line)}
.search-wrap{position:relative;flex:1;max-width:260px}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--label-4);pointer-events:none}
.search-input{padding-left:30px !important}
.toolbar-hint{font-size:var(--text-xs);color:var(--label-4);white-space:nowrap}
.tbl-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:0 max(24px,calc(16px + var(--safe-left))) max(20px,calc(16px + var(--safe-bottom)));background:var(--bg)}
table{width:100%;border-collapse:collapse;font-size:var(--text-sm);background:var(--surface);margin-top:14px;border:var(--line)}
thead th{background:var(--bg);padding:9px 12px;text-align:left;font-weight:600;color:var(--label-4);border-bottom:var(--line);font-size:var(--text-xs);letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap}
td{padding:12px 12px;border-bottom:var(--line);color:var(--label-1);transition:background .1s;white-space:nowrap;letter-spacing:-0.005em}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-2)}
.col-amount{font-variant-numeric:tabular-nums;font-weight:600;color:var(--label-1)}
.badge{display:inline-flex;align-items:center;padding:3px 7px;font-size:var(--text-xs);font-weight:500;white-space:nowrap;letter-spacing:0.01em}
.badge-budgeted{background:var(--surface-2);color:var(--label-3)}
.badge-approved{background:var(--accent-bg);color:var(--accent-dark)}
.badge-invoice-raised{background:var(--orange-bg);color:var(--orange-text)}
.badge-invoice-sent{background:var(--teal-bg);color:var(--teal-text)}
.badge-partially-paid{background:var(--orange-bg);color:var(--orange-text)}
.badge-paid{background:var(--green-bg);color:var(--green-text)}
.badge-overdue{background:var(--red-bg);color:var(--red-text)}
.badge-cancelled{background:var(--surface-2);color:var(--label-4)}
.badge-written-off{background:var(--purple-bg);color:var(--purple-text)}
.row-actions{display:flex;gap:0}
.row-btn{width:44px;height:44px;background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--label-4);transition:background .1s,color .1s;touch-action:manipulation}
.row-btn:active{transform:scale(0.88)}
.row-btn:hover{background:var(--surface-2);color:var(--label-1)}
.row-btn.del:hover{color:var(--red);background:var(--red-bg)}
.empty-state{display:flex;flex-direction:column;align-items:flex-start;padding:56px 0;gap:6px}
.empty-state .empty-icon{color:var(--label-4);opacity:.25;margin-bottom:8px}
.empty-title{font-size:var(--text-body);font-weight:600;color:var(--label-2);letter-spacing:-0.02em}
.empty-desc{font-size:var(--text-sm);color:var(--label-3);max-width:260px;line-height:1.6}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.overlay.visible{display:flex;animation:fadeIn .15s ease}
.modal{background:var(--surface);width:560px;max-width:100%;max-height:calc(90vh - var(--safe-top) - var(--safe-bottom));overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px;border:var(--line);border-top:2px solid var(--label-1);animation:slideUp .2s cubic-bezier(.16,1,.3,1)}
.modal-pnl{width:960px;max-width:95vw}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:var(--text-body);font-weight:600;color:var(--label-1);letter-spacing:-0.02em}
.modal-title-serif{font-family:'Inter',sans-serif;font-size:21px;font-weight:700;letter-spacing:-0.03em}
.modal-close{width:44px;height:44px;background:transparent;border:var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--label-3);transition:background .1s,color .1s;touch-action:manipulation}
.modal-close:hover{background:var(--surface-2);color:var(--label-1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.ff{display:flex;flex-direction:column;gap:4px} .ff.full{grid-column:1/-1}
.fl{font-size:var(--text-xs);font-weight:600;color:var(--label-3);letter-spacing:0.04em;text-transform:uppercase}
.fh{font-size:var(--text-xs);color:var(--label-4);margin-top:1px}
.modal-actions{display:flex;justify-content:flex-end;gap:6px;padding-top:14px;border-top:var(--line)}

/* CONFIRM SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:flex-start;z-index:300;padding:max(24px,var(--safe-left));padding-bottom:max(24px,var(--safe-bottom))}
.sheet-overlay.visible{display:flex;animation:fadeIn .12s ease}
.sheet{background:var(--surface);width:100%;max-width:360px;padding:22px;border:var(--line);border-top:2px solid var(--label-1);animation:sheetUp .2s cubic-bezier(.16,1,.3,1)}
.sheet-title{font-size:var(--text-body);font-weight:600;margin-bottom:6px;letter-spacing:-0.02em}
.sheet-body{font-size:var(--text-sm);color:var(--label-3);margin-bottom:16px;line-height:1.6}
.sheet-actions{display:flex;flex-direction:column;gap:6px}

/* TOAST */
.toast{position:fixed;bottom:max(24px,var(--safe-bottom));left:max(24px,calc(16px + var(--safe-left)));background:var(--label-1);color:#fff;padding:10px 16px;font-size:var(--text-sm);opacity:0;transform:translateY(5px);transition:opacity .18s,transform .18s;pointer-events:none;z-index:1000;font-weight:500;max-width:min(320px,calc(100vw - 48px));letter-spacing:-0.01em}
.toast.show{opacity:1;transform:translateY(0)}

/* P&L */
.pnl-bar{background:var(--bg);padding:12px 16px;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;border-bottom:var(--line)}
.date-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.date-row label{font-size:var(--text-xs);font-weight:600;color:var(--label-3);letter-spacing:0.04em;text-transform:uppercase}
.date-row input{padding:7px 10px;width:auto;min-height:40px;font-size:14px}
.qf{display:flex;gap:3px;flex-wrap:wrap}
.qf .btn{padding:8px 12px;font-size:var(--text-xs);min-height:38px}
.pnl-grid{display:flex;gap:1px;flex-wrap:wrap;background:var(--sep-solid);border:var(--line)}
.pnl-col{flex:1;min-width:200px;background:var(--surface);padding:16px}
.pnl-col-hdr{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.pnl-dot{width:6px;height:6px;flex-shrink:0}
.pnl-dot.income{background:var(--green)} .pnl-dot.expense{background:var(--red)}
.pnl-col-title{font-size:var(--text-sm);font-weight:600;letter-spacing:-0.01em}
.pnl-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:var(--line);font-size:var(--text-sm)}
.pnl-row:last-of-type{border-bottom:none}
.pnl-cat{color:var(--label-2)} .pnl-amt{font-variant-numeric:tabular-nums;font-weight:500}
.pnl-total{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:var(--line);font-weight:700;font-size:var(--text-sm);font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
.net-card{background:var(--label-1);padding:18px;margin-top:1px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.net-lbl{font-size:var(--text-sm);color:rgba(255,255,255,.55);font-weight:500}
.net-period{font-size:var(--text-xs);color:rgba(255,255,255,.35);margin-top:2px}
.net-val{font-size:26px;font-weight:700;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;color:#fff}
.net-pos{color:#4ade80!important} .net-neg{color:#f87171!important}
.pnl-empty{padding:40px 0;color:var(--label-4);font-size:var(--text-sm);text-align:left}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes sheetUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}

/* DESKTOP (>1024px) */
@media(min-width:1025px){
  .app-header{padding:0 32px;padding-top:var(--safe-top);height:calc(54px + var(--safe-top))}
  .hero{padding:22px 32px}
  .toolbar{padding:10px 32px}
  .tbl-wrap{padding:0 32px max(24px,calc(16px + var(--safe-bottom)))}
  .hact .btn span{display:inline}
  .modal{padding:32px}
}

/* TABLET LANDSCAPE + SMALL LAPTOP (768-1024px) */
@media(min-width:768px) and (max-width:1024px){
  .hero{padding:18px 24px}
  .toolbar{padding:10px 24px}
  .tbl-wrap{padding:0 24px max(20px,calc(16px + var(--safe-bottom)))}
  .app-header{padding:0 24px;padding-top:var(--safe-top);padding-right:max(24px,calc(16px + var(--safe-right)))}
  .modal{padding:24px}
  .hact .btn span{display:inline}
}

/* TABLET PORTRAIT (600-767px) */
@media(min-width:600px) and (max-width:767px){
  .app-header{padding:0 20px;padding-top:var(--safe-top);height:calc(50px + var(--safe-top))}
  .hero{padding:16px 20px;gap:14px}
  .toolbar{padding:10px 20px}
  .tbl-wrap{padding:0 20px max(20px,calc(16px + var(--safe-bottom)))}
  .hact .btn span{display:inline}
  .search-wrap{max-width:220px}
}

/* MOBILE (<=599px) */
@media(max-width:599px){
  .app-header{padding:0 12px;padding-top:var(--safe-top);padding-left:max(12px,calc(8px + var(--safe-left)));height:calc(48px + var(--safe-top))}
  .source-pill{max-width:60px;font-size:10px}
  .hact .btn span{display:none}
  .hact .btn{min-width:40px;padding:8px 10px}
  .hero{grid-template-columns:1fr;padding:14px 16px;gap:10px}
  .hero-stats{justify-content:flex-start;gap:16px;flex-wrap:wrap}
  .hero-value{font-size:28px}
  .stat-val{font-size:17px}
  .toolbar{flex-direction:column;align-items:stretch;padding:8px 12px;gap:6px}
  .search-wrap{max-width:100%}
  .toolbar-hint{display:none}
  .tbl-wrap{padding:0 0 max(20px,calc(16px + var(--safe-bottom)));overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{margin-top:0;border-left:none;border-right:none;min-width:480px}
  thead th:first-child,td:first-child{position:sticky;left:0;z-index:1;background:inherit}
  thead th:first-child{background:var(--bg)}
  tr:hover td:first-child{background:var(--surface-2)}
  td{padding:11px 8px}
  thead th{padding:8px 8px}
  .overlay{align-items:flex-end;justify-content:stretch;padding:0}
  .modal{width:100%;max-width:100%;border-left:none;border-right:none;border-bottom:none;border-top:2px solid var(--label-1);max-height:92dvh;padding:18px 16px max(20px,var(--safe-bottom));animation:sheetUp .25s cubic-bezier(.16,1,.3,1)}
  .modal-pnl{max-width:100%;max-height:94dvh}
  .form-grid{grid-template-columns:1fr}
  .pnl-grid{flex-direction:column;gap:0}
  .pnl-bar{flex-direction:column;align-items:flex-start;gap:10px}
  .date-row{width:100%}
  .date-row input{flex:1}
  .net-card{flex-direction:column;align-items:flex-start}
  .sheet-overlay{padding:12px;padding-bottom:max(20px,var(--safe-bottom));padding-left:max(12px,var(--safe-left))}
  .sheet{max-width:100%}
  .toast{left:max(12px,var(--safe-left));right:max(12px,var(--safe-right));bottom:max(16px,var(--safe-bottom));max-width:none;text-align:center}
}

/* SMALL PHONES (<=374px) */
@media(max-width:374px){
  .hero-value{font-size:24px}
  .hact .btn{min-width:36px;padding:7px 8px}
  .header-logo{width:22px;height:22px}
}

/* LANDSCAPE PHONES */
@media(max-width:767px) and (orientation:landscape){
  #app{height:100dvh}
  .hero{padding:10px 20px;gap:10px}
  .hero-value{font-size:24px}
  .tbl-wrap{padding:0 0 max(12px,var(--safe-bottom))}
  .toolbar{padding:6px 16px}
  .app-header{height:calc(44px + var(--safe-top))}
}
</style>
</head>
<body>

<!-- Token Modal -->
<div class="overlay" id="tokenModal">

<script>
/* ============ DATA ============ */
const EXCEL_COLS=["ID (Auto)","Date","Type","Description","Category","Lifecycle Status","Paid By","Currency","Actual (USD)","Split %","Notes / Invoice Ref","Rate Used"];
const CATS=["Salaries & Contractor Fees","Software & AI Tools","Marketing & Branding","Travel & Client Meetings","Legal & Compliance","Accounting / Finance","Office / Remote Setup","Internet & Utilities","Subscriptions (SaaS, research, cloud)","Training & Certifications","Hiring / Recruitment","Taxes & Fees","Miscellaneous"];
const STATUSES=["Budgeted","Approved","Invoice Raised","Invoice Sent","Partially Paid","Paid","Overdue","Cancelled","Written Off"];
const VCOLS=['date','desc','category','status','amountUSD'];
const VLBLS=['Date','Description','Category','Status','Amount (USD)'];

let ST={source:'local',fileName:'database.xlsx',rateData:84,transactions:[],searchQuery:'',localFileHandle:null,currentEditId:null,paidByHistory:new Set(),sheetCb:null,ghToken:'',ghRepo:'',ghPath:'',ghSha:''};

/* ============ UTILS ============ */
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fUSD=v=>{let n=parseFloat(v);return isNaN(n)?'$0.00':'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})};
const fINR=v=>{let n=parseFloat(v);return isNaN(n)?'₹0.00':'₹'+n.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})};
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800)}

/* ============ CONFIRM SHEET ============ */
function showSheet(title,body,okLabel,okCls,cb){
  document.getElementById('sheetTitle').textContent=title;
  document.getElementById('sheetBody').textContent=body;
  const b=document.getElementById('sheetOkBtn');
  b.textContent=okLabel; b.className='btn '+okCls;
  ST.sheetCb=cb;
  b.onclick=()=>{const cb=ST.sheetCb;closeSheet();if(cb)cb()};
  document.getElementById('confirmSheet').classList.add('visible');
  b.focus();
}
function closeSheet(){document.getElementById('confirmSheet').classList.remove('visible');ST.sheetCb=null}
/* ============ AUTO LOAD ============ */
const GH_REPO='kneuralabs/trax',GH_FILE='database.xlsx';
async function autoLoadGitHub(){
  try{
    const token=localStorage.getItem('ghToken')||'';
    const hdrs={Accept:'application/vnd.github.v3+json'};
    if(token)hdrs['Authorization']='token '+token;
    const res=await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,{headers:hdrs});
    if(!res.ok){toast('Could not load database ('+res.status+')');updateStats();renderTable();return}
    const meta=await res.json();
    const raw=atob(meta.content.replace(/\n/g,''));
    const buf=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)buf[i]=raw.charCodeAt(i);
    parseWB(XLSX.read(buf,{type:'array'}));
    ST.source='github';ST.ghToken=token;ST.fileName=GH_FILE;
    document.getElementById('sourceLabel').textContent=GH_FILE;
  }catch(e){toast('Load error: '+e.message)}
  updateStats();renderTable();
}
(async()=>{
  const t=localStorage.getItem('ghToken');
  if(t)document.getElementById('ghToken').value=t;
  await autoLoadGitHub();
})();
/* ============ THEME ============ */
const MOON_IC='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const SUN_IC='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
function applyTheme(dark){document.documentElement.setAttribute('data-theme',dark?'dark':'');document.getElementById('themeIcon').innerHTML=dark?MOON_IC:SUN_IC}
function toggleTheme(){const dark=document.documentElement.getAttribute('data-theme')!=='dark';localStorage.setItem('theme',dark?'dark':'light');applyTheme(dark)}
applyTheme(localStorage.getItem('theme')==='dark'||(localStorage.getItem('theme')===null&&window.matchMedia('(prefers-color-scheme:dark)').matches));
async function handleGitHubLoad(){
  const token=document.getElementById('ghToken').value.trim();
  const errEl=document.getElementById('ghError');
  errEl.style.display='none';
  if(!token){errEl.textContent='Enter your GitHub personal access token.';errEl.style.display='block';return}
  localStorage.setItem('ghToken',token);
  ST.ghToken=token;
  closeTokenModal();
  toast('✓ Token saved — pushing now…');
  await pushToGitHub();
}

/* ============ APP LIFECYCLE ============ */
function launchApp(){updateStats();renderTable()}
function closeTokenModal(){document.getElementById('tokenModal').classList.remove('visible')}
async function pushToGitHub(){
  if(!ST.ghToken){document.getElementById('tokenModal').classList.add('visible');document.getElementById('ghToken').focus();return}
  const hdrs={Authorization:`token ${ST.ghToken}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'};
  try{
    const fileUrl=`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`;
    const check=await fetch(fileUrl,{headers:hdrs});
    if(!check.ok&&check.status!==404){toast('Could not read file: '+check.status);return}
    let currentSha=null;
    if(check.ok){const fm=await check.json();currentSha=fm.sha}
    const wbo=XLSX.write(buildWB(),{type:'base64',bookType:'xlsx'});
    const body={message:`KneuraTRAX update ${new Date().toISOString().slice(0,16)}`,content:wbo};
    if(currentSha)body.sha=currentSha;
    const res=await fetch(fileUrl,{method:'PUT',headers:hdrs,body:JSON.stringify(body)});
    if(!res.ok){
      const e=await res.json();
      if(res.status===401)toast('Token invalid or expired — re-enter in Push Token panel');
      else toast('Push failed: '+(e.message||res.status));
      return;
    }
    toast('✓ Saved to GitHub');
  }catch(e){toast('Push error: '+e.message)}
}

/* ============ STATS ============ */
function updateStats(){
  const rate=ST.rateData;let incUSD=0,expUSD=0;
  for(const t of ST.transactions){if(isExp(t.type))expUSD+=t.amountUSD;else incUSD+=t.amountUSD}
  const netUSD=incUSD-expUSD,netINR=netUSD*rate;
  document.getElementById('statNet').textContent=fUSD(netUSD);
  document.getElementById('statNetINR').textContent=fINR(netINR);
  document.getElementById('statInc').textContent=fUSD(incUSD);
  document.getElementById('statIncINR').textContent=fINR(incUSD*rate);
  document.getElementById('statExp').textContent=fUSD(expUSD);
  document.getElementById('statExpINR').textContent=fINR(expUSD*rate);
  document.getElementById('statRate').textContent='₹'+rate;
  const se=document.getElementById('statStatus');
  if(netUSD>0){se.innerHTML='<svg class="ic" style="width:11px;height:11px" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> Surplus';se.className='hero-status surplus'}
  else if(netUSD<0){se.innerHTML='<svg class="ic" style="width:11px;height:11px" viewBox="0 0 24 24"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg> Deficit';se.className='hero-status deficit'}
  else{se.textContent='—';se.className='hero-status'}
}

/* ============ TABLE ============ */
const EDIT_IC=`<svg class="ic" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const DEL_IC=`<svg class="ic" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

function getFiltered(){const q=ST.searchQuery.toLowerCase();if(!q)return ST.transactions;return ST.transactions.filter(t=>Object.values(t).some(v=>String(v).toLowerCase().includes(q)))}

function renderTable(){
  const rows=getFiltered(),w=document.getElementById('tableWrapper');
  if(!rows.length){w.innerHTML=`<div class="empty-state"><div class="empty-icon"><svg class="ic" style="width:40px;height:40px" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><div class="empty-title">No transactions yet</div><div class="empty-desc">Click <strong>Add</strong> to record your first transaction.</div></div>`;return}
  let h=`<table><thead><tr><th style="width:76px">Actions</th>${VLBLS.map(l=>`<th>${l}</th>`).join('')}</tr></thead><tbody>`;
  for(const r of rows){
    const sc=`badge-${String(r.status||'').toLowerCase().replace(/ /g,'-')}`;
    h+=`<tr><td><div class="row-actions"><button class="row-btn edit" title="Edit" onclick="openEditModal(${r.id})">${EDIT_IC}</button><button class="row-btn del" title="Delete" onclick="deleteTransaction(${r.id})">${DEL_IC}</button></div></td><td>${esc(r.date)}</td><td>${esc(r.desc)}</td><td>${esc(r.category)}</td><td><span class="badge ${sc}">${esc(r.status)}</span></td><td class="col-amount">${fUSD(r.amountUSD)}</td></tr>`;
  }
  h+='</tbody></table>';
  w.innerHTML=h;
}

/* ============ FORM ============ */
function frmHTML(d,isEdit){
  d=d||{date:new Date().toISOString().slice(0,10),type:'Income',desc:'',category:'Miscellaneous',status:'Budgeted',paidBy:'',currency:'USD',amountUSD:0,splitPct:50,notes:'',rate:ST.rateData};
  const cats=CATS.map(c=>`<option ${d.category===c?'selected':''}>${esc(c)}</option>`).join('');
  const stats=STATUSES.map(s=>`<option ${d.status===s?'selected':''}>${esc(s)}</option>`).join('');
  const pbo=Array.from(ST.paidByHistory).map(n=>`<option value="${esc(n)}">`).join('');
  const liveBtnAttrs=isEdit?'disabled title="Rate is locked for existing transactions" style="padding:8px 10px;white-space:nowrap;font-size:11px;flex-shrink:0;opacity:.4;cursor:not-allowed"':'style="padding:8px 10px;white-space:nowrap;font-size:11px;flex-shrink:0"';
  return`<div class="ff"><label class="fl">Date</label><input type="date" id="fd" value="${esc(d.date)}"></div>
<div class="ff"><label class="fl">Type</label><select id="ft"><option ${d.type==='Income'?'selected':''}>Income</option><option ${d.type==='Expense'?'selected':''}>Expense</option></select></div>
<div class="ff full"><label class="fl">Description</label><input type="text" id="fdesc" value="${esc(d.desc)}" placeholder="What was this for?"></div>
<div class="ff"><label class="fl">Category</label><select id="fcat">${cats}</select></div>
<div class="ff"><label class="fl">Lifecycle Status</label><select id="fst">${stats}</select></div>
<div class="ff"><label class="fl">Paid By</label><input list="pbl" id="fpb" value="${esc(d.paidBy)}" placeholder="Person or entity"><datalist id="pbl">${pbo}</datalist></div>
<div class="ff"><label class="fl">Currency</label><input type="text" id="fcur" value="${esc(d.currency)}"></div>
<div class="ff"><label class="fl">Actual (USD)</label><input type="number" step="any" id="famt" value="${d.amountUSD}" style="font-variant-numeric:tabular-nums"></div>
<div class="ff"><label class="fl">Split %</label><input type="number" step="any" id="fsplit" value="${d.splitPct}"><div class="fh">Applies to Expenses only</div></div>
<div class="ff"><label class="fl">Rate Used</label><div style="display:flex;gap:6px;align-items:center"><input type="number" step="any" id="frate" value="${d.rate}" style="font-variant-numeric:tabular-nums;flex:1"><button type="button" class="btn btn-ghost" ${liveBtnAttrs} onclick="fetchLiveRate()" id="fetchRateBtn">↻ Live</button></div></div>
<div class="ff full"><label class="fl">Notes / Invoice Ref</label><input type="text" id="fnotes" value="${esc(d.notes)}" placeholder="Optional reference"></div>`;
}

function openAddModal(){ST.currentEditId=null;document.getElementById('modalTitle').textContent='New Transaction';document.getElementById('transactionForm').innerHTML=frmHTML(null,false);document.getElementById('modalSaveBtn').onclick=saveTxn;document.getElementById('formModal').classList.add('visible');setTimeout(()=>{const f=document.querySelector('#formModal input, #formModal select');if(f)f.focus()},60)}
function openEditModal(id){const txn=ST.transactions.find(t=>t.id===id);if(!txn)return;ST.currentEditId=id;document.getElementById('modalTitle').textContent='Edit Transaction';document.getElementById('transactionForm').innerHTML=frmHTML(txn,true);document.getElementById('modalSaveBtn').onclick=saveTxn;document.getElementById('formModal').classList.add('visible');setTimeout(()=>{const f=document.querySelector('#formModal input, #formModal select');if(f)f.focus()},60)}
function closeModal(){document.getElementById('formModal').classList.remove('visible');ST.currentEditId=null}

function modalKey(e){
  if(e.key==='Escape'){closeModal();return}
  if(e.key==='Tab'){const m=document.querySelector('#formModal .modal');const els=[...m.querySelectorAll('button,input,select,[tabindex]:not([tabindex="-1"])')];const first=els[0],last=els[els.length-1];if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus()}else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus()}}
}

let _autoSaveTimer=null;
function autoSave(){clearTimeout(_autoSaveTimer);_autoSaveTimer=setTimeout(()=>{if(ST.ghToken)pushToGitHub()},1500)}
function saveTxn(){
  const date=document.getElementById('fd').value;
  if(!date){toast('Date is required');return}
  const txn={id:ST.currentEditId||(ST.transactions.length?Math.max(...ST.transactions.map(t=>t.id))+1:1),date,type:document.getElementById('ft').value,desc:document.getElementById('fdesc').value,category:document.getElementById('fcat').value,status:document.getElementById('fst').value,paidBy:document.getElementById('fpb').value.trim(),currency:document.getElementById('fcur').value,amountUSD:parseFloat(document.getElementById('famt').value)||0,splitPct:parseFloat(document.getElementById('fsplit').value)||50,notes:document.getElementById('fnotes').value,rate:parseFloat(document.getElementById('frate').value)||ST.rateData};
  recompute(txn);
  if(ST.currentEditId){const i=ST.transactions.findIndex(t=>t.id===ST.currentEditId);if(i!==-1)ST.transactions[i]=txn}else ST.transactions.push(txn);
  ST.transactions.sort((a,b)=>a.id-b.id);ST.transactions.forEach((t,i)=>t.id=i+1);
  if(txn.paidBy)ST.paidByHistory.add(txn.paidBy);
  closeModal();updateStats();renderTable();toast(ST.currentEditId?'✓ Updated':'✓ Added');autoSave();
}

function deleteTransaction(id){
  const txn=ST.transactions.find(t=>t.id===id);
  const lbl=txn?(txn.desc||'this transaction'):'this transaction';
  showSheet('Delete transaction?',`"${lbl}" will be permanently removed. This cannot be undone.`,'Delete','btn-destructive',()=>{ST.transactions=ST.transactions.filter(t=>t.id!==id);ST.transactions.forEach((t,i)=>t.id=i+1);rebuildPH();updateStats();renderTable();toast('Deleted');autoSave()});
}
function filterTable(){ST.searchQuery=document.getElementById('searchBox').value;renderTable()}

/* ============ DATA OPS ============ */
const isExp=t=>String(t).toLowerCase()==='expense';
function recompute(txn){const rate=parseFloat(txn.rate)||ST.rateData,usd=parseFloat(txn.amountUSD)||0;txn.amountINR=+(usd*rate).toFixed(2);if(isExp(txn.type)){const s=parseFloat(txn.splitPct)||50;txn.splitPct=s;txn.piyalShare=+(txn.amountINR*s/100).toFixed(2);txn.gauthamShare=+(txn.amountINR*(100-s)/100).toFixed(2)}else{txn.piyalShare=0;txn.gauthamShare=0}txn.rate=rate;return txn}
function rebuildPH(){ST.paidByHistory.clear();for(const t of ST.transactions)if(t.paidBy&&t.paidBy.trim())ST.paidByHistory.add(t.paidBy);["Piyal","Gautham","Company","Shared","Client"].forEach(v=>ST.paidByHistory.add(v))}

function parseWB(wb){
  if(wb.SheetNames.includes('Rates')){const rs=wb.Sheets['Rates'];const rows=XLSX.utils.sheet_to_json(rs,{header:1,defval:''});for(const row of rows){const n=parseFloat(row[1]);if(!isNaN(n)&&n>0){ST.rateData=n;break}}}
  let ls=null;
  for(const sn of wb.SheetNames){const ws=wb.Sheets[sn];const hdrs=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',sheetRows:1})[0];if(!hdrs)continue;const hs=hdrs.map(h=>String(h||'').replace(/\s+/g,' ').trim());if(hs.some(h=>h.includes('ID')&&h.includes('Auto'))&&hs.includes('Date')&&hs.includes('Type')){ls=ws;break}}
  if(!ls){ST.transactions=[];rebuildPH();return}
  const rows=XLSX.utils.sheet_to_json(ls,{header:1,defval:'',raw:false});
  if(rows.length<2){ST.transactions=[];rebuildPH();return}
  const hdrs=rows[0].map(h=>String(h||'').replace(/\s+/g,' ').trim());
  const ci={};for(const c of EXCEL_COLS){const norm=c.replace(/\s+/g,' ').trim();let i=hdrs.findIndex(h=>h===norm);if(i===-1)i=hdrs.findIndex(h=>h.replace(/[^a-z0-9]/gi,'')===norm.replace(/[^a-z0-9]/gi,''));ci[c]=i}
  const txns=[];
  for(let i=1;i<rows.length;i++){const row=rows[i];const get=c=>ci[c]!==undefined&&ci[c]>=0?String(row[ci[c]]||'').trim():'';const tr=get('Type');if(!tr)continue;const txn={id:parseInt(get('ID (Auto)'))||0,date:get('Date')||'',type:tr.toLowerCase().includes('expense')?'Expense':'Income',desc:get('Description')||'',category:get('Category')||'Miscellaneous',status:get('Lifecycle Status')||'Budgeted',paidBy:get('Paid By')||'',currency:get('Currency')||'USD',amountUSD:parseFloat(get('Actual (USD)'))||0,splitPct:parseFloat(get('Split %'))||50,notes:get('Notes / Invoice Ref')||'',rate:parseFloat(get('Rate Used'))||ST.rateData};if(!CATS.includes(txn.category))txn.category='Miscellaneous';if(!STATUSES.includes(txn.status))txn.status='Budgeted';recompute(txn);txns.push(txn)}
  txns.forEach((t,i)=>t.id=i+1);ST.transactions=txns;rebuildPH();
}
function buildWB(){const wb=XLSX.utils.book_new();const rows=[EXCEL_COLS];for(const t of ST.transactions)rows.push([t.id,t.date,t.type,t.desc,t.category,t.status,t.paidBy,t.currency,t.amountUSD,t.splitPct,t.notes,t.rate]);XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),'Ledger');XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([["Live Rate",ST.rateData],["Fallback",84]]),'Rates');return wb}
async function saveExcel(){await pushToGitHub()}

/* ============ P&L ============ */
function showPnLModal(){
  document.getElementById('pnlModal').classList.add('visible');
  const today=new Date(),end=today.toISOString().slice(0,10);
  const start=new Date(today.setMonth(today.getMonth()-1)).toISOString().slice(0,10);
  document.getElementById('pnlStart').value=start;document.getElementById('pnlEnd').value=end;genPnL();
}
function closePnLModal(){document.getElementById('pnlModal').classList.remove('visible')}

function setRange(r){
  const ed=new Date(),es=ed.toISOString().slice(0,10);let sd=new Date();
  if(r==='quarter')sd.setMonth(ed.getMonth()-3);else if(r==='6months')sd.setMonth(ed.getMonth()-6);else if(r==='yearly')sd.setFullYear(ed.getFullYear()-1);else if(r==='5yearly')sd.setFullYear(ed.getFullYear()-5);
  document.getElementById('pnlStart').value=sd.toISOString().slice(0,10);document.getElementById('pnlEnd').value=es;genPnL();
}

function genPnL(){
  const sr=document.getElementById('pnlStart').value,er=document.getElementById('pnlEnd').value;
  if(!sr||!er){document.getElementById('pnlOut').innerHTML='<div class="pnl-empty">Select both dates</div>';return}
  const sd=new Date(sr),ed=new Date(er);ed.setHours(23,59,59,999);
  const fil=ST.transactions.filter(t=>{if(!t.date)return false;const d=new Date(t.date);return d>=sd&&d<=ed});
  let im=new Map(),em=new Map(),ti=0,te=0;
  for(const t of fil){const a=t.amountUSD||0;if(t.type==='Income'){ti+=a;const c=t.category||'Miscellaneous';im.set(c,(im.get(c)||0)+a)}else if(t.type==='Expense'){te+=a;const c=t.category||'Miscellaneous';em.set(c,(em.get(c)||0)+a)}}
  const net=ti-te;
  const si=[...im.entries()].sort((a,b)=>b[1]-a[1]);
  const se=[...em.entries()].sort((a,b)=>b[1]-a[1]);
  const rows=arr=>arr.length?arr.map(([c,v])=>`<div class="pnl-row"><span class="pnl-cat">${esc(c)}</span><span class="pnl-amt">${fUSD(v)}</span></div>`).join(''):`<div class="pnl-empty" style="padding:20px 0">No entries in period</div>`;
  document.getElementById('pnlOut').innerHTML=`<div class="pnl-grid"><div class="pnl-col"><div class="pnl-col-hdr"><div class="pnl-dot income"></div><div class="pnl-col-title">Income</div></div>${rows(si)}<div class="pnl-total"><span>Total Income</span><span>${fUSD(ti)}</span></div></div><div class="pnl-col"><div class="pnl-col-hdr"><div class="pnl-dot expense"></div><div class="pnl-col-title">Expenses</div></div>${rows(se)}<div class="pnl-total"><span>Total Expenses</span><span>${fUSD(te)}</span></div></div></div><div class="net-card"><div><div class="net-lbl">Net Profit / (Loss)</div><div class="net-period">${sr} — ${er}</div></div><div class="net-val ${net>=0?'net-pos':'net-neg'}">${fUSD(net)}</div></div>`;
}

async function fetchLiveRate(){
  const btn=document.getElementById('fetchRateBtn');
  if(!btn||btn.disabled)return;
  const orig=btn.textContent;btn.textContent='…';btn.disabled=true;
  const sources=[
    async()=>{const r=await fetch('https://api.frankfurter.app/latest?from=USD&to=INR');if(!r.ok)throw new Error();const d=await r.json();return d.rates.INR},
    async()=>{const r=await fetch('https://open.er-api.com/v6/latest/USD');if(!r.ok)throw new Error();const d=await r.json();return d.rates.INR},
    async()=>{const r=await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');if(!r.ok)throw new Error();const d=await r.json();return d.usd.inr}
  ];
  let rate=null;
  for(const src of sources){try{rate=await src();if(rate)break}catch{}}
  if(rate){
    document.getElementById('frate').value=parseFloat(rate).toFixed(2);
    ST.rateData=parseFloat(rate);
    toast('✓ Live rate: ₹'+parseFloat(rate).toFixed(2)+' / $1');
  }else{toast('Could not fetch rate — check connection')}
  btn.textContent=orig;btn.disabled=false;
}

/* ============ WIRING ============ */
document.querySelectorAll('[data-range]').forEach(b=>b.addEventListener('click',e=>setRange(e.currentTarget.dataset.range)));
document.getElementById('applyPnL').addEventListener('click',genPnL);

document.addEventListener('keydown',e=>{
  if(e.key!=='Escape')return;
  if(document.getElementById('formModal').classList.contains('visible'))closeModal();
  else if(document.getElementById('pnlModal').classList.contains('visible'))closePnLModal();
  else if(document.getElementById('confirmSheet').classList.contains('visible'))closeSheet();
  else if(document.getElementById('tokenModal').classList.contains('visible'))closeTokenModal();
});

Object.assign(window,{openAddModal,openEditModal,deleteTransaction,saveExcel,pushToGitHub,filterTable,closeModal,showPnLModal,closePnLModal,handleGitHubLoad,modalKey,closeSheet,closeTokenModal,fetchLiveRate,toggleTheme});
